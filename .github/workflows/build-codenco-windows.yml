name: Build - CodeN'Co Studio - Windows x64

# Workflow dérivé de ci-build-windows.yml, dédié au fork CodeN'Co Studio.
# Build manuel, x64 uniquement, installeur système .exe seul.
# Aucune signature, aucune release, aucun push cross-repo, aucun WinGet.

on:
  workflow_dispatch: {}

env:
  APP_NAME: CodeNCo
  BINARY_NAME: codium
  GH_REPO_PATH: ${{ github.repository }}
  ORG_NAME: ${{ github.repository_owner }}
  OS_NAME: windows
  VSCODE_QUALITY: stable

permissions:
  contents: read

jobs:
  compile:
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    env:
      VSCODE_ARCH: 'x64'
    outputs:
      BUILD_SOURCEVERSION: ${{ env.BUILD_SOURCEVERSION }}
      MS_COMMIT: ${{ env.MS_COMMIT }}
      MS_TAG: ${{ env.MS_TAG }}
      RELEASE_VERSION: ${{ env.RELEASE_VERSION }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Setup Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Clone VSCode repo
        run: ./get_repo.sh

      - name: Build
        env:
          SHOULD_BUILD: yes
          SHOULD_BUILD_REH: no
          SHOULD_BUILD_REH_WEB: no
        run: ./build.sh

      - name: Compress vscode artifact
        run: |
          find vscode -type f -not -path "*/node_modules/*" -not -path "vscode/.build/node/*" -not -path "vscode/.git/*" > vscode.txt
          echo "vscode/.build/extensions/node_modules" >> vscode.txt
          echo "vscode/.git" >> vscode.txt
          tar -czf vscode.tar.gz -T vscode.txt

      - name: Upload vscode artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode
          path: ./vscode.tar.gz
          retention-days: 1

  build:
    needs:
      - compile
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    env:
      # RELEASE_VERSION vient de compile (et non d'un job "check" inexistant ici) :
      # c'est get_repo.sh dans le job compile qui l'écrit dans GITHUB_ENV.
      BUILD_SOURCEVERSION: ${{ needs.compile.outputs.BUILD_SOURCEVERSION }}
      MS_COMMIT: ${{ needs.compile.outputs.MS_COMMIT }}
      MS_TAG: ${{ needs.compile.outputs.MS_TAG }}
      RELEASE_VERSION: ${{ needs.compile.outputs.RELEASE_VERSION }}
      SHOULD_BUILD_REH: no
      SHOULD_BUILD_REH_WEB: no
      VSCODE_ARCH: 'x64'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Setup Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Download vscode artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vscode

      - name: Build (package)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: x64
          npm_config_target_arch: x64
        run: ./build/windows/package.sh

      - name: Prepare assets (installeur système .exe uniquement)
        env:
          SHOULD_BUILD_ZIP: no
          SHOULD_BUILD_EXE_SYS: yes
          SHOULD_BUILD_EXE_USR: no
          SHOULD_BUILD_MSI: no
          SHOULD_BUILD_MSI_NOUP: no
        run: ./prepare_assets.sh

      - name: Upload installer (.exe)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: CodeNCo-Setup-x64
          path: assets/*.exe
          retention-days: 7
